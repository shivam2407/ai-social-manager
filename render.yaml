services:
  - type: web
    name: ai-social-manager
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: cd langgraph-api && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: NODE_VERSION
        value: 20
